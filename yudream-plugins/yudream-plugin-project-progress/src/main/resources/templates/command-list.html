<!doctype html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box}html,body{margin:0;padding:0;background:transparent;font-family:"Microsoft YaHei",sans-serif;color:#172033}#command-card{width:820px;padding:30px;background:#f5f7fb;border:1px solid #d8deea}.head{display:flex;justify-content:space-between;align-items:end;margin-bottom:18px}.title{font-size:28px;font-weight:700}.count{color:#6b7485}.item{display:grid;grid-template-columns:42px 1fr auto;gap:13px;padding:15px 16px;background:#fff;border-left:4px solid #3478f6;border-bottom:1px solid #e5e9f1}.item+.item{margin-top:9px}.num{width:30px;height:30px;display:grid;place-items:center;background:#172033;color:#fff;font-weight:700}.name{font-size:18px;font-weight:700}.desc{margin-top:5px;color:#70798a;font-size:14px;line-height:1.45}.meta{color:#3478f6;font-size:14px}.footer{margin-top:18px;padding-top:14px;border-top:1px solid #d8deea;color:#596273;text-align:center;font-size:14px}
</style></head><body><section id="command-card"><div class="head"><div class="title" th:text="${title}">列表</div><div class="count" th:text="${items.size()+' 项'}">0 项</div></div><article class="item" th:each="item,stat:${items}"><div class="num" th:text="${stat.count}">1</div><div><div class="name" th:text="${item.title}">任务</div><div class="desc" th:if="${!item.description.isEmpty()}" th:text="${item.description}">说明</div></div><div class="meta" th:text="${item.meta}">状态</div></article><div class="footer" th:text="${footer}">提示</div></section></body></html>
