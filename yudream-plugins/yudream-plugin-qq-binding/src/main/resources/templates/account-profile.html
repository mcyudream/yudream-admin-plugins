<!doctype html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box}html,body{margin:0;padding:0;background:transparent;font-family:"Microsoft YaHei",sans-serif;color:#182033}#account-card{width:680px;padding:30px;background:#f5f7fb;border:1px solid #d8deea}.head{display:flex;align-items:center;gap:18px;padding-bottom:20px;border-bottom:1px solid #d8deea}.avatar{width:64px;height:64px;display:grid;place-items:center;background:#3468d4;color:#fff;font-size:30px;font-weight:700}.nickname{font-size:25px;font-weight:700}.username{margin-top:4px;color:#697386}.rows{margin-top:15px}.row{display:flex;justify-content:space-between;padding:12px 4px;border-bottom:1px solid #e2e6ee}.label{color:#7a8393}.value{font-weight:600}.status{color:#168451}.footer{text-align:center;color:#7a8393;font-size:13px;margin-top:18px}
</style></head><body><section id="account-card"><div class="head"><div class="avatar" th:text="${#strings.substring(nickname,0,1)}">U</div><div><div class="nickname" th:text="${nickname}">用户</div><div class="username" th:text="${'@'+username}">@user</div></div></div><div class="rows"><div class="row"><span class="label">绑定 QQ</span><span class="value" th:text="${qq}">-</span></div><div class="row"><span class="label">邮箱</span><span class="value" th:text="${email}">-</span></div><div class="row"><span class="label">账号状态</span><span class="value status" th:text="${status}">正常</span></div></div><div class="footer">YuDream 账号绑定</div></section></body></html>
