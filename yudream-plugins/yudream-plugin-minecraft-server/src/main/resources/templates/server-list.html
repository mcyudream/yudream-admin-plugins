<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: transparent; color: #fff; font-family: "Microsoft YaHei", sans-serif; }
    #minecraft-card { width: 900px; padding: 34px; background: #151515; border: 4px solid #080808; box-shadow: inset 0 0 0 3px #4b4b4b; }
    .title { text-align: center; font-size: 30px; font-weight: 700; text-shadow: 3px 3px #303030; margin-bottom: 24px; }
    .summary { display: flex; justify-content: space-between; margin: 0 6px 12px; color: #aaa; font-size: 17px; }
    .server { display: grid; grid-template-columns: 74px minmax(0, 1fr) auto; gap: 16px; min-height: 108px; padding: 14px; background: #242424; border: 3px solid #555; box-shadow: inset 0 0 0 2px #0b0b0b; }
    .server + .server { margin-top: 12px; }
    .icon { width: 74px; height: 74px; display: grid; place-items: center; overflow: hidden; background: #315f28; border: 5px solid #1d3719; box-shadow: inset 0 0 0 5px #69a653; font-size: 38px; font-weight: 800; text-shadow: 2px 2px #1c3218; }
    .icon img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }
    .offline .icon { background: #5a3030; border-color: #321a1a; box-shadow: inset 0 0 0 5px #9c5050; }
    .name { font-size: 22px; font-weight: 700; line-height: 1.25; text-shadow: 2px 2px #111; }
    .motd { color: #c9c9c9; font-size: 16px; line-height: 1.45; margin-top: 4px; white-space: pre-line; overflow-wrap: anywhere; }
    .meta { color: #777; font-size: 14px; margin-top: 5px; }
    .status { min-width: 180px; text-align: right; }
    .count { font-size: 20px; color: #bcbcbc; }
    .signal { color: #55ff55; letter-spacing: 2px; font-size: 19px; }
    .offline .signal, .offline .count { color: #ff5555; }
    .version { color: #888; font-size: 13px; margin-top: 5px; }
    .players { grid-column: 2 / 4; display: flex; flex-wrap: wrap; gap: 7px; margin-top: -2px; }
    .player { padding: 5px 8px; background: #101010; border: 1px solid #555; color: #ddd; font-size: 14px; }
    .more { color: #888; padding: 5px 2px; font-size: 14px; }
    .empty { color: #777; font-style: italic; padding: 5px 0; font-size: 14px; }
    .footer { margin-top: 20px; text-align: center; color: #777; font-size: 14px; }
  </style>
</head>
<body>
<section id="minecraft-card">
  <div class="title">服务器列表</div>
  <div class="summary"><span th:text="${serverCount + ' 个服务器'}">0 个服务器</span><span th:text="${totalOnline + ' 人在线'}">0 人在线</span></div>
  <article class="server" th:each="server : ${servers}" th:classappend="${server.online} ? '' : ' offline'">
    <div class="icon"><img th:if="${server.favicon != null}" th:src="${server.favicon}" alt=""><span th:if="${server.favicon == null}">MC</span></div>
    <div>
      <div class="name" th:text="${'#' + server.index + '  ' + server.name}">#1 Minecraft Server</div>
      <div class="motd" th:text="${server.motd}">A Minecraft Server</div>
      <div class="meta" th:text="${server.address + ' · ' + server.edition}">play.example.com</div>
    </div>
    <div class="status">
      <div class="count" th:text="${server.online ? server.onlinePlayers + '/' + server.maxPlayers : '无法连接'}">0/20</div>
      <div class="signal" th:text="${server.online ? '▮▮▮▮' : '×'}">▮▮▮▮</div>
      <div class="version" th:text="${server.version + ' · ' + server.ping}">1.21 · 20 ms</div>
    </div>
    <div class="players">
      <span class="player" th:each="player : ${server.players}" th:text="${player}">Steve</span>
      <span class="more" th:if="${server.unreportedPlayers > 0}" th:text="${'+ ' + server.unreportedPlayers + ' 位玩家未上报名称'}">+ 1 位玩家</span>
      <span class="empty" th:if="${server.onlinePlayers == 0}">当前无人在线</span>
    </div>
  </article>
  <div class="footer">发送 /服务器 编号 查看单个服务器，例如 /服务器 1</div>
</section>
</body>
</html>
