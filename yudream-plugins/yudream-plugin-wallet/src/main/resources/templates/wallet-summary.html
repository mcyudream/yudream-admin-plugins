<!doctype html><html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box}html,body{margin:0;padding:0;background:transparent;font-family:"Microsoft YaHei",sans-serif;color:#14251c}#wallet-card{width:760px;padding:30px;background:#f3f7f4;border:1px solid #cfddd3}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.title{font-size:28px;font-weight:700}.mark{width:45px;height:45px;display:grid;place-items:center;background:#176b43;color:#fff;font-size:25px;font-weight:700}.row{display:grid;grid-template-columns:1fr auto;gap:14px;padding:16px 18px;background:#fff;border-bottom:1px solid #dce7df}.row+.row{margin-top:8px}.label{font-size:17px;font-weight:700}.note{margin-top:4px;color:#728077;font-size:13px}.value{align-self:center;color:#176b43;font-size:20px;font-weight:700}.footer{text-align:center;color:#728077;font-size:13px;margin-top:17px}
</style></head><body><section id="wallet-card"><div class="head"><div class="title" th:text="${title}">钱包</div><div class="mark">¥</div></div><article class="row" th:each="row:${rows}"><div><div class="label" th:text="${row.label}">项目</div><div class="note" th:text="${row.note}">说明</div></div><div class="value" th:text="${row.value}">0.00</div></article><div class="footer" th:text="${footer}">提示</div></section></body></html>
